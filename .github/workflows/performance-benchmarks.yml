name: Performance Benchmarks

on:
  pull_request:
    branches:
      - main
    paths:
      - "homoglyphs_fork/**.py"
      - "tests/**.py"

permissions:
  contents: read
jobs:
  benchmark:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout Base Branch (Main)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main
          path: main

      - name: Checkout PR Branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version-file: main/.python-version
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Get Baseline Benchmark
        working-directory: main
        run: |
          uv sync --group dev
          uv run pytest tests/test_benchmarks.py --benchmark-min-rounds=100 --benchmark-json=../baseline.json
      - name: Compare with PR Benchmark
        working-directory: ${{ github.event.pull_request.head.sha }}
        run: |
          uv sync --group dev
          uv run pytest tests/test_benchmarks.py --benchmark-min-rounds=100 --benchmark-compare=../baseline.json --benchmark-compare-fail=mean:20%

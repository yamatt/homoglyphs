name: Performance Benchmarks

on:
  pull_request:
    branches:
      - main
    paths:
      - "homoglyphs_fork/**.py"
      - "tests/**.py"

permissions:
  contents: read
jobs:
  benchmark:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout Base Branch (Main)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          path: main

      - name: Checkout PR Branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version-file: main/.python-version
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Get Baseline Benchmark
        working-directory: main
        run: |
          uv sync --group dev
          uv run pytest tests/test_benchmarks.py --benchmark-min-rounds=100 --benchmark-json=../baseline.json
      - name: Compare with PR Benchmark
        working-directory: ${{ github.event.pull_request.head.sha }}
        run: |
          uv sync --group dev
          uv run pytest tests/test_benchmarks.py --benchmark-min-rounds=100 --benchmark-compare=../baseline.json --benchmark-compare-fail=mean:20%
